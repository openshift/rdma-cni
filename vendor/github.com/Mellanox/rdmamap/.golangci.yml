version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocognit
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - mnd
    - nakedret
    - prealloc
    - rowserrcheck
    - staticcheck
    - revive
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    dupl:
      threshold: 150
    funlen:
      lines: 100
      statements: 50
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport # https://github.com/go-critic/go-critic/issues/845
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
        - unnamedResult
    gocognit:
      min-complexity: 30
    govet:
      enable:
        - shadow
      settings:
        printf:
          funcs:
            - (github.com/rs/zerolog/zerolog.Event).Msgf
    lll:
      line-length: 120
    misspell:
      locale: US
    mnd:
      checks:
        - argument
        - case
        - condition
        - return
    prealloc:
      simple: true
      range-loops: true
      for-loops: false
  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - mnd
          - goconst
      - text: "Magic number: 1"
        linters:
          - mnd

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Mellanox/rdmamap
